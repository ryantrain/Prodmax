<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="../styles/login.css">
        <meta charset="UTF-8" />
        <script src="../scripts/login.js" defer></script>
        <meta 
            http-equiv="Content-Security-Policy" 
            content="default-src 'self'; connect-src http://localhost:8000 https://*.supabase.co wss://*.supabase.co"
        >

        <title>ProdMax</title>
  </head>

    <body>

        <div class="main-container">

            <div class="login-container">

                <form method="POST" action="http://localhost:8000/api/login" id="login-form" class="login-fields">
                    <p class="login-title">Login</p>
                    <p class="invalid-login" id="invalid-login" hidden>Invalid email or password.*</p>

                    <input type="email" name="email" placeholder="Email" required class="username"/>
                    <input type="password" id="password" name="password" placeholder="Password" required class="password"/>
                    <button type="submit" class="submit">Login</button>
                    <button type="button" class="register" id="register-button">Register</button>
                </form>
            </div>

            <div class="spinner hidden" id="spinner"></div>
        </div>

    </body>
</html>
