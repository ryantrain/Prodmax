<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="../styles/login.css">
        <meta charset="UTF-8" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src http://localhost:8000"
        />
        <meta
            http-equiv="X-Content-Security-Policy"
            content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src http://localhost:8000"
        />
        <title>Prodmax</title>
  </head>

    <body>

        <div class="main-container">

            <div class="login-container">

                <form method="POST" action="http://localhost:8000/api/login" id="login-form" class="login-fields">
                    <p>Login</p>
                    <input type="text" name="username" placeholder="Username" required class="username"/>
                    <input type="password" name="password" placeholder="Password" required class="password"/>
                    <button type="submit" class="submit">Login</button>
                    <button type="button" class="register" onclick="window.location.href='register.html'">Register</button>
                </form>

                <script>
                    document.getElementById('login-form').addEventListener('submit', async(e) => {
                        e.preventDefault();

                        try {
                            const formData = new FormData(e.target);

                            const response = await fetch('http://localhost:8000/api/login', {
                                method: 'POST',
                                body: formData
                            });

                            const data = await response.json();

                            if (data.message === 'Login successful') {
                                window.location.href = 'dashboard.html';
                            } else {
                                alert(data.message);
                            }

                        } catch (error) {
                            console.error('Error during login:', error);
                        }

                    });

                </script>
            </div>
        </div>

    </body>
</html>
