<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="../styles/register.css">
        <meta charset="UTF-8" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src http://localhost:8000"
        />
        <meta
            http-equiv="X-Content-Security-Policy"
            content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src http://localhost:8000"
        />
        <title>ProdMax</title>
  </head>

<body>

    <div class="main-container">

        <div class="previous-button-container">
            <button class="previous-button" onclick="window.location.href='login.html'">← Back to Login</button>
        </div>

        <div class="register-container">

            <form class="register-fields" id="register-form">

                <p>Register</p>
                <input type="text" name="username" placeholder="Username" required class="register-item" grid-area="username"/>
                <input type="email" name="email" placeholder="Email" required class="register-item" grid-area="email"/>
                <input type="phone-number" name="phone" placeholder="Phone Number" class="register-item" grid-area="phone"/>
                <input type="password" name="password" placeholder="Password" required class="register-item" grid-area="password"/>
                <button type="submit" class="register" id="register">Register</button>
 
            </form>

            <script>
                document.getElementById('register-form').addEventListener('submit', async(e) => {
                e.preventDefault();

                try {
                    console.log("checkpoint 1");
                    const formData = new FormData(e.target);

                    const response = await fetch('http://localhost:8000/api/register', {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();

                    console.log("checkpoint 2", data);

                    if (data.message === 'Registration successful') {
                        alert('Registration successful! Please log in.');
                        console.log("checjpoint 3");
                    } else {
                        alert(data.message);
                    }
                } catch (error) {
                    console.error('Error during registration:', error);
                }

                })

            </script>
        </div>
    </div>
</body>
