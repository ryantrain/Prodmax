<!DOCTYPE html>

<head>
    <link rel="stylesheet" href="../styles/navbar.css">
    <link rel="stylesheet" href="../styles/dashboard.css">

    <script src="../scripts/dashboard.js" defer></script>
    <meta charset="UTF-8" />
    <meta
        http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' http://localhost:8000; connect-src http://localhost:8000"
    />

    <title>Prodmax</title>
</head>
<header></header>

<body>

    <div class="main-container">

        <nav class="navbar">
            <button class="menu-btn" onclick="toggleSidebar()">
                ☰
            </button>

            <h2 class="logo">Prodmax</h2>

            <button class="friends_toggler" onclick="toggleFriendRequests()" id="friends_toggle">
                <img src="../assets/svgs/friends.svg">
            </button>

            <button class="channel_list_toggler" onclick="toggleChannelList()" id="channel_list_toggle">
                <img src="../assets/images/messages.png">
            </button>
        </nav>

        <div id="sidebar" class="sidebar">
            <a href="dashboard.html">Home</a>
            <a href="taskboards.html">Taskboards</a>
            <a href="workspaces.html">Workspaces</a>
            <a href="settings.html">Settings</a>
        </div>

        <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

        <div id="friends_overlay" class="overlay" onclick="toggleFriendRequests()"></div>

        <div id="friends_sidebar" class="friends_sidebar">
            <button class="add_friends_button" onclick="toggleAddFriends()">
                <svg fill="#ffffff" version="1.1" id="Capa_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 45.902 45.902" xml:space="preserve" stroke="#ffffff"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <g> <g> <path d="M43.162,26.681c-1.564-1.578-3.631-2.539-5.825-2.742c1.894-1.704,3.089-4.164,3.089-6.912 c0-5.141-4.166-9.307-9.308-9.307c-4.911,0-8.932,3.804-9.281,8.625c4.369,1.89,7.435,6.244,7.435,11.299 c0,1.846-0.42,3.65-1.201,5.287c1.125,0.588,2.162,1.348,3.066,2.26c2.318,2.334,3.635,5.561,3.61,8.851l-0.002,0.067 l-0.002,0.057l-0.082,1.557h11.149l0.092-12.33C45.921,30.878,44.936,28.466,43.162,26.681z"></path> <path d="M23.184,34.558c1.893-1.703,3.092-4.164,3.092-6.912c0-5.142-4.168-9.309-9.309-9.309c-5.142,0-9.309,4.167-9.309,9.309 c0,2.743,1.194,5.202,3.084,6.906c-4.84,0.375-8.663,4.383-8.698,9.318l-0.092,1.853h14.153h15.553l0.092-1.714 c0.018-2.514-0.968-4.926-2.741-6.711C27.443,35.719,25.377,34.761,23.184,34.558z"></path> <path d="M6.004,11.374v3.458c0,1.432,1.164,2.595,2.597,2.595c1.435,0,2.597-1.163,2.597-2.595v-3.458h3.454 c1.433,0,2.596-1.164,2.596-2.597c0-1.432-1.163-2.596-2.596-2.596h-3.454V2.774c0-1.433-1.162-2.595-2.597-2.595 c-1.433,0-2.597,1.162-2.597,2.595V6.18H2.596C1.161,6.18,0,7.344,0,8.776c0,1.433,1.161,2.597,2.596,2.597H6.004z"></path> </g> </g> </g></svg>
            </button>

            <div id="add_friends_container" class="add_friends_container">
                <input type="text" id="add_friends_input" placeholder="Enter username" class="add_friends_input"/>
                <button type="button" id="add_friends_submit" class="add_friends_submit" onclick="sendFriendRequest()">+</button>
            </div>
        </div>

        <section class="tasks-section">

            <div class="tasks-header">
                <h2>Tasks</h2>
                <button class="create-task-button" id="create_button">Create</button>
                
                <div class="modal-overlay" id="modal-overlay">
                    <div class="modal">
                        <h2>Create Task</h2>

                        <input id="task-input" type="text" placeholder="Task name" required/>

                        <div class="modal-buttons">
                            <button id="cancel-button" class="cancel-button">Cancel</button>
                            <button id="add-button" class="add-button">Add Task</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="hidden" id="emptyState">
                <h2>No Tasks!</h2>
                <p>Create your first task to get started.</p>
            </div>
            
            <div class="task-list" id="task-list"></div>

        </section>

        <div class="channel_container" id="channel_list"></div>
        <div class="message_pane" id="message_pane">
            <div class="messages_section">
                <button type="button" class="message_pane_toggler" onclick="closeMessagePane()" aria-label="Back to channels">←</button>
                <div class="messages_list" id="messages_section"></div>
            </div>

            <form id="message_input_form">
                <input class="message_input_form" type="text" name="message_input" placeholder="Type your message here..." required/>
            </form>
        </div>
    </div>

</body>

</html>
