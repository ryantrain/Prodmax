<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../styles/navbar.css">
    <link rel="stylesheet" href="../styles/my_taskboard.css">
    <link rel="stylesheet" href="../styles/organization_taskboard.css">
    <meta charset="UTF-8">
    <script src="../scripts/navbar.js" defer></script>
    <script src="../config/realtime_organization_taskboard.js" type="module" defer></script>
    <script src="../scripts/organization_taskboard.js" defer></script>
    <script src="../config/realtime_navbar.js" type="module" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskboards</title>
    <meta 
        http-equiv="Content-Security-Policy" 
        content="default-src 'self'; connect-src http://localhost:8000 https://*.supabase.co wss://*.supabase.co"
    >
</head>
<body>
    <div class="main-container">
        <nav class="navbar">
            <button class="menu-btn" id="menu-btn">
                ☰
            </button>

            <h2 class="logo">Prodmax</h2>

            <button class="friends_toggler" id="friends_toggle">
                <img src="../assets/svgs/friends.svg">
            </button>

            <button class="channel_list_toggler" id="channel_list_toggle">
                <img src="../assets/images/messages.png">
            </button>
        </nav>

        <div id="sidebar" class="sidebar">
            <a id="home_link">Home</a>
            <a id="organizations_link">Organizations</a>
            <a id="workspaces_link" href="workspaces.html">Workspaces</a>
            <a id="settings_link" href="settings.html">Settings</a>
            <a id="logout_link">Log out</a>
        </div>

        <div id="overlay" class="overlay"></div>

        <div id="friends_overlay" class="overlay"></div>

        <div id="add_task_overlay" class="add_task_overlay"></div>

        <div class="organization_members_container" id="organization_members_container">
            <div class="organization_members_close_button">
                <button class="organization_members_close_button" id="organization_members_close_button">
                    <svg fill="#ffffff" height="200px" width="200px" version="1.1" id="Capa_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 460.775 460.775" xml:space="preserve" stroke="#ffffff"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M285.08,230.397L456.218,59.27c6.076-6.077,6.076-15.911,0-21.986L423.511,4.565c-2.913-2.911-6.866-4.55-10.992-4.55 c-4.127,0-8.08,1.639-10.993,4.55l-171.138,171.14L59.25,4.565c-2.913-2.911-6.866-4.55-10.993-4.55 c-4.126,0-8.08,1.639-10.992,4.55L4.558,37.284c-6.077,6.075-6.077,15.909,0,21.986l171.138,171.128L4.575,401.505 c-6.074,6.077-6.074,15.911,0,21.986l32.709,32.719c2.911,2.911,6.865,4.55,10.992,4.55c4.127,0,8.08-1.639,10.994-4.55 l171.117-171.12l171.118,171.12c2.913,2.911,6.866,4.55,10.993,4.55c4.128,0,8.081-1.639,10.992-4.55l32.709-32.719 c6.074-6.075,6.074-15.909,0-21.986L285.08,230.397z"></path> </g></svg>
                </button>
            </div>
            
            <div class="organization_members_header_title">
                <h2>Organization Members</h2>
            </div>

            <div class="organization_members_list" id="organization_members_list"></div>

        </div>

        <div id="invite_members_overlay" class="invite_members_overlay">
            <div class="invite_members_container" id="invite_members_container">

                <div class="invite_members_header_title">
                    <h2>Invite Members</h2>
                </div>

                <div class="invite_members_search_query">
                    <input id="invite_members_search_query_input" type="search" placeholder="Enter usernames..." class="invite_members_search_query_input"/>
                </div>

                <div class="invite_members_selected_count">
                    <a id="invite_members_selected_count_link">0 members selected</a>
                </div>

                <div class="invite_members_list" id="invite_members_list">
                    <!-- <div class="invite_members_list_item">
                        <input type="checkbox" class="invite_members_list_item_checkbox"/>
                        <span class="invite_members_list_item_username">Username</span>
                    </div> -->
                </div>

                <div class="invite_members_buttons">
                    <button class="invite_members_cancel_button" id="invite_members_cancel_button">Cancel</button>
                    <button class="invite_members_confirm_button" id="invite_members_confirm_button">Invite</button>
                </div>
            </div>
        </div>

        <div id="assign_members_overlay" class="assign_members_overlay">
            <div class="assign_members_container" id="assign_members_container">

                <div class="assign_members_selected_count">
                    <a id="assign_members_selected_count_link">0 Members Selected</a>
                </div>

                <div class="assign_members_list" id="assign_members_list">
                </div>

                <div class="assign_members_buttons">
                    <button class="assign_members_cancel_button" id="assign_members_cancel_button">Cancel</button>
                    <button class="assign_members_confirm_button" id="assign_members_confirm_button">Done</button>
                </div>
            </div>
        </div>

        <div id="friends_sidebar" class="friends_sidebar">
            <div class="friends_sidebar_header"><h2 class="friends_sidebar_title">Friends</h2>
                <button class="add_friends_button" id="add_friends_button">
                    <svg fill="#ffffff" version="1.1" id="Capa_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 45.902 45.902" xml:space="preserve" stroke="#ffffff"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <g> <g> <path d="M43.162,26.681c-1.564-1.578-3.631-2.539-5.825-2.742c1.894-1.704,3.089-4.164,3.089-6.912 c0-5.141-4.166-9.307-9.308-9.307c-4.911,0-8.932,3.804-9.281,8.625c4.369,1.89,7.435,6.244,7.435,11.299 c0,1.846-0.42,3.65-1.201,5.287c1.125,0.588,2.162,1.348,3.066,2.26c2.318,2.334,3.635,5.561,3.61,8.851l-0.002,0.067 l-0.002,0.057l-0.082,1.557h11.149l0.092-12.33C45.921,30.878,44.936,28.466,43.162,26.681z"></path> <path d="M23.184,34.558c1.893-1.703,3.092-4.164,3.092-6.912c0-5.142-4.168-9.309-9.309-9.309c-5.142,0-9.309,4.167-9.309,9.309 c0,2.743,1.194,5.202,3.084,6.906c-4.84,0.375-8.663,4.383-8.698,9.318l-0.092,1.853h14.153h15.553l0.092-1.714 c0.018-2.514-0.968-4.926-2.741-6.711C27.443,35.719,25.377,34.761,23.184,34.558z"></path> <path d="M6.004,11.374v3.458c0,1.432,1.164,2.595,2.597,2.595c1.435,0,2.597-1.163,2.597-2.595v-3.458h3.454 c1.433,0,2.596-1.164,2.596-2.597c0-1.432-1.163-2.596-2.596-2.596h-3.454V2.774c0-1.433-1.162-2.595-2.597-2.595 c-1.433,0-2.597,1.162-2.597,2.595V6.18H2.596C1.161,6.18,0,7.344,0,8.776c0,1.433,1.161,2.597,2.596,2.597H6.004z"></path> </g> </g> </g></svg>
                </button>
            </div>

            <div class="friends_sidebar_search_query">
                <input type="search" class="friends_sidebar_search_query_input" id="friends_sidebar_search_query_input" placeholder="Search friends...">
            </div>
            
            <div class="friend_requests_pane" id="friend_requests_pane">
                <div class="friend_requests_pane_header">
                    <button class="friend_requests_pane_back" id="friend_requests_pane_back">←</button>
                    <span class="friend_requests_pane_title">Friend Requests</span>
                </div>

                <div class="friend_requests_list" id="friend_requests_list"></div>

                <div class="add_friends_container" id="add_friends_container">
                    <input type="text" id="add_friends_input" placeholder="Add by username" class="add_friends_input"/>
                    <button type="button" id="add_friends_submit" class="add_friends_submit">+</button>
                </div>
            </div>

        </div>

        <div class="channel_container" id="channel_list">
            <div class="channel_header_row">
                <h3 class="hidden" id="channel_creation_title">Channel Creation</h3>
                <button class="toggle_channel_creation_button" id="toggle_channel_creation_button">
                    <svg fill="#ffffff" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52" enable-background="new 0 0 52 52" xml:space="preserve" stroke="#ffffff"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M45.5,17l-3.4,3.5c-0.6,0.6-0.9,1.3-0.9,2.1V40c0,0.8-0.7,1.5-1.5,1.5h-27c-0.8,0-1.5-0.7-1.5-1.5V13 c0-0.8,0.7-1.5,1.5-1.5h17.5c0.8,0,1.6-0.3,2.1-0.9l3.4-3.4c0.6-0.6,0.2-1.7-0.7-1.7H9.2c-2.2,0-4,1.8-4,4v34c0,2.2,1.8,4,4,4h34 c2.2,0,4-1.8,4-4V17.7C47.2,16.8,46.1,16.4,45.5,17z"></path> <path d="M18.9,30.7l3.7,3.7c0.2,0.2,0.4,0.2,0.6,0l19.4-19.9c0.2-0.2,0.2-0.4,0-0.6L39,10.3c-0.2-0.2-0.4-0.2-0.6,0 L18.9,30.1C18.7,30.3,18.7,30.5,18.9,30.7z"></path> <path d="M40.1,8.6c-0.2,0.2-0.2,0.4,0,0.6l3.6,3.6c0.2,0.2,0.4,0.2,0.6,0l2.5-2.5c0.7-0.6,0.7-1.6,0-2.3l-1.8-1.8 c-0.7-0.7-1.7-0.7-2.4,0C42.5,6.2,40.1,8.6,40.1,8.6z"></path> <path d="M15.6,36.9c-0.1,0.4,0.3,0.8,0.7,0.7c0.6-0.2,1.3-0.3,1.9-0.5c0.5-0.1,1-0.2,1.5-0.4c0.5-0.1,1-0.2,1.4-0.4 c0.2-0.1,0.6-0.5,0.3-0.8c0,0-3.8-3.8-3.8-3.8c-0.3-0.3-0.6,0-0.7,0.2c-0.3,0.4-0.4,1-0.5,1.4c-0.1,0.5-0.3,1-0.4,1.5 C15.9,35.7,15.8,36.3,15.6,36.9z"></path> </g></svg>

            </div>
            
            <div class="channel_header_contents_row">
                <h2 class="selected_channels_counter hidden" id="selected_channels_counter">0 Selected</h2>
                <button class="create_channel_button hidden" id="create_channel_button">Create Channel</button>
            </div>

            <div class="create_group_channel_search_channel_query hidden" id="create_group_channel_search_channel_query">
                <search class="create_group_channel_search_query">
                    <input type="search" class="create_group_channel_search_query_input" id="create_group_channel_search_query_input" placeholder="Search connections...">
                </search>
            </div>
        </div>

        <div class="message_pane" id="message_pane">
            <div class="messages_section">
                <button type="button" id="message_pane_toggler" class="message_pane_toggler" aria-label="Back to channels">←</button>
                <div class="messages_list" id="messages_section"></div>
            </div>

            <form id="message_input_form">
                <input class="message_input_form" type="text" name="message_input" placeholder="Type your message here..." required/>
            </form>
        </div>
        
        <div class="task-list" id="task-list">
            
            <div class="organization_taskboard_header_container" id="organization_taskboard_header_container">
                <div class="organization_taskboard_header_title"></div>
                <button class="organization_taskboard_header_members_button" id="organization_taskboard_header_members_button">
                    <img src="../assets/svgs/members.svg">
                </button>
                <button class="invite_members_button" id="invite_members_button">Invite members</button>
                <button class="organization_settings_button" id="organization_settings_button">
                    <svg fill="#ffffff" height="200px" width="200px" version="1.1" id="Capa_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 478.703 478.703" xml:space="preserve" stroke="#ffffff"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" stroke="#CCCCCC" stroke-width="4.78703"></g><g id="SVGRepo_iconCarrier"> <g> <g> <path d="M454.2,189.101l-33.6-5.7c-3.5-11.3-8-22.2-13.5-32.6l19.8-27.7c8.4-11.8,7.1-27.9-3.2-38.1l-29.8-29.8 c-5.6-5.6-13-8.7-20.9-8.7c-6.2,0-12.1,1.9-17.1,5.5l-27.8,19.8c-10.8-5.7-22.1-10.4-33.8-13.9l-5.6-33.2 c-2.4-14.3-14.7-24.7-29.2-24.7h-42.1c-14.5,0-26.8,10.4-29.2,24.7l-5.8,34c-11.2,3.5-22.1,8.1-32.5,13.7l-27.5-19.8 c-5-3.6-11-5.5-17.2-5.5c-7.9,0-15.4,3.1-20.9,8.7l-29.9,29.8c-10.2,10.2-11.6,26.3-3.2,38.1l20,28.1 c-5.5,10.5-9.9,21.4-13.3,32.7l-33.2,5.6c-14.3,2.4-24.7,14.7-24.7,29.2v42.1c0,14.5,10.4,26.8,24.7,29.2l34,5.8 c3.5,11.2,8.1,22.1,13.7,32.5l-19.7,27.4c-8.4,11.8-7.1,27.9,3.2,38.1l29.8,29.8c5.6,5.6,13,8.7,20.9,8.7c6.2,0,12.1-1.9,17.1-5.5 l28.1-20c10.1,5.3,20.7,9.6,31.6,13l5.6,33.6c2.4,14.3,14.7,24.7,29.2,24.7h42.2c14.5,0,26.8-10.4,29.2-24.7l5.7-33.6 c11.3-3.5,22.2-8,32.6-13.5l27.7,19.8c5,3.6,11,5.5,17.2,5.5l0,0c7.9,0,15.3-3.1,20.9-8.7l29.8-29.8c10.2-10.2,11.6-26.3,3.2-38.1 l-19.8-27.8c5.5-10.5,10.1-21.4,13.5-32.6l33.6-5.6c14.3-2.4,24.7-14.7,24.7-29.2v-42.1 C478.9,203.801,468.5,191.501,454.2,189.101z M451.9,260.401c0,1.3-0.9,2.4-2.2,2.6l-42,7c-5.3,0.9-9.5,4.8-10.8,9.9 c-3.8,14.7-9.6,28.8-17.4,41.9c-2.7,4.6-2.5,10.3,0.6,14.7l24.7,34.8c0.7,1,0.6,2.5-0.3,3.4l-29.8,29.8c-0.7,0.7-1.4,0.8-1.9,0.8 c-0.6,0-1.1-0.2-1.5-0.5l-34.7-24.7c-4.3-3.1-10.1-3.3-14.7-0.6c-13.1,7.8-27.2,13.6-41.9,17.4c-5.2,1.3-9.1,5.6-9.9,10.8l-7.1,42 c-0.2,1.3-1.3,2.2-2.6,2.2h-42.1c-1.3,0-2.4-0.9-2.6-2.2l-7-42c-0.9-5.3-4.8-9.5-9.9-10.8c-14.3-3.7-28.1-9.4-41-16.8 c-2.1-1.2-4.5-1.8-6.8-1.8c-2.7,0-5.5,0.8-7.8,2.5l-35,24.9c-0.5,0.3-1,0.5-1.5,0.5c-0.4,0-1.2-0.             </div>
        </div>

        <div class="add_task_container" id="add_task_container">
            <input class="task_title_input" id="task_title_input" type="text" placeholder="Enter title..." required/>
            <textarea class="task_description_input" id="task_description_input" placeholder="Enter task content..." required></textarea>
            <button class="submit_task_button" id="submit_task_button">Add Task</button>
            <button class="close_add_task_button" id="close_add_task_button">Cancel</button>
        </div>

        <div class="add_task_container" id="edit_task_container">
            <input class="task_title_input" id="task_title_input_edit" type="text" placeholder="Enter title..." required/>
            <textarea class="task_description_input" id="task_description_input_edit" placeholder="Enter task content..." required></textarea>
            <button class="submit_task_button" id="confirm_edit_task_button">Confirm Edit</button>
            <button class="close_add_task_button" id="close_edit_task_button">Cancel</button>
        </div>

        <div class="add_task_container" id="edit_organization_container">
            <input class="task_title_input" id="organization_name_input_edit" type="text" placeholder="Enter title..." required/>
            <textarea class="task_description_input" id="organization_description_input_edit" placeholder="Enter organization content..." required></textarea>
            <button class="submit_task_button" id="confirm_edit_organization_button">Confirm Edit</button>
            <button class="close_add_task_button" id="close_edit_organization_button">Cancel</button>
        </div>
</body>
</html>
